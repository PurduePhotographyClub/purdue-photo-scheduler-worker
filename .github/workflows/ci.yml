name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: React Doctor
        run: npm run doctor

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Secret pattern scan
        shell: bash
        run: |
          if grep -RInE "(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|-----BEGIN (RSA|OPENSSH|EC|PRIVATE) KEY-----)" . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.wrangler --exclude=package-lock.json --exclude='.env*' --exclude='.dev.vars*'; then
            echo "Potential committed secret material found."
            exit 1
          fi

      - name: Upload deploy artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-worker-dist
          path: dist
          if-no-files-found: error

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    concurrency:
      group: scheduler-worker-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: scheduler-worker-dist
          path: dist

      - name: Check Cloudflare deploy token
        id: cloudflare-token
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN is not set; skipping Cloudflare deployment."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        if: steps.cloudflare-token.outputs.available == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: 63a413648250a48c6caa17e9963f5ee1
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4.103.0 deploy dist/index.js --no-bundle --config wrangler.toml
